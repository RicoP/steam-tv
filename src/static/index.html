<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Steam TV Baseline</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111318;
      color: #f2f4f8;
      font-family: Arial, sans-serif;
    }

    main {
      box-sizing: border-box;
      min-height: 100%;
      padding: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      background:
        linear-gradient(135deg, rgba(60, 130, 190, 0.32), transparent 42%),
        linear-gradient(315deg, rgba(220, 80, 80, 0.24), transparent 48%),
        #111318;
    }

    h1 {
      margin: 0;
      font-size: 64px;
      line-height: 1.05;
      font-weight: 800;
    }

    p {
      margin: 0;
      max-width: 760px;
      font-size: 28px;
      line-height: 1.4;
      color: #c8d0dc;
    }

    .status {
      width: fit-content;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      font-size: 20px;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 24px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.12);
      color: #f2f4f8;
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    a:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .stage {
      position: relative;
      width: min(760px, 100%);
      height: 180px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.24);
      overflow: hidden;
    }

    .tile {
      position: absolute;
      left: 32px;
      top: 42px;
      width: 96px;
      height: 96px;
      background: #38d89f;
      box-shadow: 0 18px 48px rgba(56, 216, 159, 0.36);
    }

    .tile.play {
      animation: slide-spin 900ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slide-spin {
      0% {
        transform: translateX(0) rotate(0deg) scale(1);
        background: #38d89f;
      }

      55% {
        transform: translateX(410px) rotate(180deg) scale(1.16);
        background: #ffd166;
      }

      100% {
        transform: translateX(0) rotate(360deg) scale(1);
        background: #38d89f;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="status">raylib window + CEF off-screen browser</div>
    <h1>Steam TV Baseline</h1>
    <p>
      This page tests CEF interaction inside the native raylib render loop:
      click the button to trigger a CSS animation or follow the link to a
      second static HTML page.
    </p>
    <div class="actions">
      <button id="animate-button" type="button">Trigger CSS Animation</button>
      <a href="second.html">Open Second Page</a>
    </div>
    <div class="stage">
      <div id="tile" class="tile"></div>
    </div>
  </main>
  <script>
    const button = document.getElementById("animate-button");
    const tile = document.getElementById("tile");

    button.addEventListener("click", () => {
      tile.classList.remove("play");
      void tile.offsetWidth;
      tile.classList.add("play");
    });
  </script>
</body>
</html>
